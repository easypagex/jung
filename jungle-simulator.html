<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jungle Simulator</title>
<style>
  :root{
    --sky-top:#3E9BE0;
    --sky-bottom:#9FE3F5;
    --sun-core:#FFE066;
    --sun-glow:#FF9E2C;
    --cloud:#FFFDF6;
    --cloud-shadow:#DCE7EE;
    --canopy-dark:#0F3D1F;
    --canopy-mid:#1B5E30;
    --canopy-light:#2E8B3D;
    --leaf-lime:#8BC34A;
    --grass-1:#7CB518;
    --grass-2:#C7D93B;
    --grass-3:#F2D93B;
    --trunk:#7A4B24;
    --trunk-dark:#5C3517;
    --river-1:#0E8C9E;
    --river-2:#4DD9E8;
    --river-shine:#E9FFFB;
    --red-1:#E63946;
    --red-2:#C1121F;
    --orange-1:#F4772E;
    --orange-2:#FF9E4F;
    --yellow-1:#FFD100;
    --yellow-2:#F4D35E;
    --earth:#6B4226;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    background:var(--canopy-dark);
    overflow-x:hidden;
    scroll-behavior:smooth;
  }

  body{
    display:flex;
    flex-direction:column;
  }

  section{
    display:block;
    width:100%;
    line-height:0;
    position:relative;
  }

  /* ---------- animal critters ---------- */
  .critter{
    position:absolute;
    z-index:6;
    line-height:1;
    cursor:pointer;
    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
    transform-origin:50% 50%;
    transition: left 2.2s ease-in-out, transform 2.2s ease-in-out, top .3s ease;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.35));
    transform: scaleX(1);
  }
  .critter:hover{ filter: drop-shadow(0 6px 8px rgba(0,0,0,0.35)) brightness(1.15); }
  .critter:active{ filter: drop-shadow(0 6px 8px rgba(0,0,0,0.35)) brightness(0.9); }

  @media (prefers-reduced-motion: reduce){
    .critter{ transition: none; }
  }

  svg{
    display:block;
    width:100%;
    height:auto;
  }

  /* ---------- ambient sound toggle ---------- */
  #soundToggle{
    position:fixed;
    top:18px;
    right:18px;
    z-index:50;
    width:56px;
    height:56px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.65);
    background:rgba(15,61,31,0.55);
    backdrop-filter:blur(4px);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform .2s ease, background .3s ease;
  }
  #soundToggle:hover{ transform:scale(1.08); background:rgba(15,61,31,0.75); }
  #soundToggle svg{ width:26px; height:26px; }
  #soundToggle .wave{ transition:opacity .2s ease; }
  #soundToggle.muted .wave{ opacity:0; }
  #soundToggle .pulse-ring{
    position:absolute;
    inset:-6px;
    border-radius:50%;
    border:2px solid rgba(255,209,0,0.55);
    opacity:0;
    animation:pulseRing 2.4s ease-out infinite;
  }
  #soundToggle.playing .pulse-ring{ opacity:1; }
  @keyframes pulseRing{
    0%{ transform:scale(0.85); opacity:.6; }
    100%{ transform:scale(1.35); opacity:0; }
  }

  /* ---------- shared motion ---------- */
  .palm{ transform-box: fill-box; transform-origin: 50% 100%; animation: sway 4.5s ease-in-out infinite; }
  @keyframes sway{
    0%,100%{ transform: rotate(-2.2deg); }
    50%{ transform: rotate(2.4deg); }
  }
  .grass{ transform-box: fill-box; transform-origin: 50% 100%; animation: swayGrass 2.6s ease-in-out infinite; }
  @keyframes swayGrass{
    0%,100%{ transform: skewX(-7deg); }
    50%{ transform: skewX(7deg); }
  }
  .cloud{ animation: drift linear infinite; }
  @keyframes drift{
    from{ transform: translateX(-30%); }
    to{ transform: translateX(140%); }
  }
  .sun-core{ animation: sunPulse 5s ease-in-out infinite; transform-box: fill-box; transform-origin:50% 50%; }
  @keyframes sunPulse{
    0%,100%{ opacity:0.92; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.06); }
  }
  .sun-rays{ animation: rotateRays 100s linear infinite; transform-box: fill-box; transform-origin:50% 50%; }
  @keyframes rotateRays{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }
  .river-shine{ stroke-dasharray: 14 22; animation: flow 3.5s linear infinite; }
  @keyframes flow{ to{ stroke-dashoffset:-144; } }
  .bird{ animation: fly linear infinite; }
  @keyframes fly{
    from{ transform: translate(-15%,0); }
    to{ transform: translate(130%,-60px); }
  }
  .flower{ transform-box: fill-box; transform-origin:50% 100%; animation: bob 3s ease-in-out infinite; }
  @keyframes bob{
    0%,100%{ transform: translateY(0) rotate(-2deg); }
    50%{ transform: translateY(-4px) rotate(2deg); }
  }
  .flicker-light{ animation: flicker 6s ease-in-out infinite; }
  @keyframes flicker{
    0%,100%{ opacity:.18; }
    50%{ opacity:.4; }
  }

  @media (prefers-reduced-motion: reduce){
    .palm,.grass,.cloud,.sun-core,.sun-rays,.river-shine,.bird,.flower,.flicker-light{
      animation: none !important;
    }
  }

  /* ---------- footer / EasyPageX ---------- */
  footer{
    background: linear-gradient(180deg, var(--canopy-dark), #081F10);
    padding: 56px 20px 64px;
    display:flex;
    justify-content:center;
    line-height:normal;
  }
  .easypagex-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:16px 36px;
    border-radius:999px;
    background: linear-gradient(135deg, var(--yellow-1), var(--orange-1));
    color:#2A1400;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-weight:700;
    font-size:17px;
    letter-spacing:.3px;
    text-decoration:none;
    box-shadow: 0 8px 22px rgba(255,158,44,0.35), inset 0 0 0 2px rgba(255,255,255,0.25);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .easypagex-btn:hover{
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(255,158,44,0.5), inset 0 0 0 2px rgba(255,255,255,0.35);
  }
  .easypagex-btn svg{ width:18px; height:18px; }
</style>
</head>
<body>

<!-- ============ RIVER ============ -->
<section>
<svg viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="1000" fill="url(#fieldGrad)"/>

  <!-- winding river -->

<script>
(function(){
  const toggleBtn = document.getElementById('soundToggle');
  let audioCtx = null, masterGain = null;
  let soundOn = false;
  let birdTimer = null, animalTimer = null;

  function createNoiseBuffer(ctx){
    const bufferSize = ctx.sampleRate * 2;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){ data[i] = Math.random()*2-1; }
    return buffer;
  }

  function createNoiseLayer(ctx, dest, {type, freq, Q, gain, lfoRate, lfoDepth}){
    const src = ctx.createBufferSource();
    src.buffer = createNoiseBuffer(ctx);
    src.loop = true;
    const filter = ctx.createBiquadFilter();
    filter.type = type;
    filter.frequency.value = freq;
    if(Q) filter.Q.value = Q;
    const g = ctx.createGain();
    g.gain.value = gain;
    src.connect(filter).connect(g).connect(dest);
    src.start();
    if(lfoRate){
      const lfo = ctx.createOscillator();
      lfo.frequency.value = lfoRate;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = gain * (lfoDepth || 0.2);
      lfo.connect(lfoGain).connect(g.gain);
      lfo.start();
    }
    return g;
  }

  function startInsectDrone(ctx, dest){
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = 3900;
    const g = ctx.createGain();
    g.gain.value = 0.018;
    const trem = ctx.createOscillator();
    trem.frequency.value = 6.5;
    const tremGain = ctx.createGain();
    tremGain.gain.value = 0.014;
    trem.connect(tremGain).connect(g.gain);
    osc.connect(g).connect(dest);
    osc.start(); trem.start();
  }

  function playChirp(ctx, dest){
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    const baseFreq = 1800 + Math.random()*1400;
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(200,baseFreq*0.6), now+0.12);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, now);
    g.gain.linearRampToValueAtTime(0.13, now+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now+0.16);
    osc.connect(g).connect(dest);
    osc.start(now); osc.stop(now+0.2);
  }

  function scheduleBirds(ctx, dest){
    playChirp(ctx, dest);
    if(Math.random() < 0.45){ setTimeout(()=>playChirp(ctx, dest), 140 + Math.random()*120); }
    const next = 1400 + Math.random()*3200;
    birdTimer = setTimeout(()=>scheduleBirds(ctx, dest), next);
  }

  function playAnimalCall(ctx, dest){
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    const baseFreq = 280 + Math.random()*220;
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(80,baseFreq*0.5), now+0.4);
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 900;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, now);
    g.gain.linearRampToValueAtTime(0.1, now+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, now+0.5);
    osc.connect(filter).connect(g).connect(dest);
    osc.start(now); osc.stop(now+0.6);
  }

  function scheduleAnimalCalls(ctx, dest){
    playAnimalCall(ctx, dest);
    const next = 6000 + Math.random()*9000;
    animalTimer = setTimeout(()=>scheduleAnimalCalls(ctx, dest), next);
  }

  function initAudio(){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(audioCtx.destination);

    createNoiseLayer(audioCtx, masterGain, {type:'lowpass', freq:500, Q:0.7, gain:0.22, lfoRate:0.08, lfoDepth:0.35});
    createNoiseLayer(audioCtx, masterGain, {type:'bandpass', freq:1300, Q:1.1, gain:0.07});
    startInsectDrone(audioCtx, masterGain);
    scheduleBirds(audioCtx, masterGain);
    scheduleAnimalCalls(audioCtx, masterGain);
  }

  toggleBtn.addEventListener('click', function(){
    if(!audioCtx){
      initAudio();
      soundOn = true;
    } else {
      soundOn = !soundOn;
      if(soundOn){ audioCtx.resume(); } else { audioCtx.suspend(); }
    }
    toggleBtn.classList.toggle('muted', !soundOn);
    toggleBtn.classList.toggle('playing', soundOn);
  });
})();

(function(){
  document.querySelectorAll('.critter').forEach(function(el){
    el.dataset.side = 'left';
    el.addEventListener('click', function(){
      const goingRight = el.dataset.side === 'left';
      el.style.left = goingRight ? el.dataset.rightPos : el.dataset.leftPos;
      el.style.transform = goingRight ? 'scaleX(-1)' : 'scaleX(1)';
      el.dataset.side = goingRight ? 'right' : 'left';
    });
  });
})();
</script>
